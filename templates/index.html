<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>수다공원 💬</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #87CEEB;
        }

        .page { display: none; width: 100%; height: 100vh; }
        .page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* ── 랜딩 ── */
        #landingPage {
            position: relative;
            background: #a8e0f5;
            overflow: hidden;
        }

        .park-scene {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            width: 100%;
            object-fit: cover;
        }

        .landing-card {
            position: relative;
            z-index: 10;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 32px 28px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
            margin-bottom: 180px;
        }

        .app-emoji { font-size: 2.8rem; margin-bottom: 6px; }
        .app-title {
            font-size: 1.7rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FF6B6B, #FFA500, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .app-subtitle { font-size: 0.85rem; color: #888; margin-bottom: 24px; }

        .nickname-label {
            font-size: 0.82rem;
            font-weight: 700;
            color: #555;
            text-align: left;
            margin-bottom: 6px;
        }
        .nickname-input {
            width: 100%;
            padding: 13px 18px;
            border: 2px solid #e8e8e8;
            border-radius: 14px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
            background: #fafafa;
        }
        .nickname-input:focus { border-color: #667eea; background: white; }
        .nickname-input::placeholder { color: #bbb; }

        .btn-start {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255,107,107,0.4);
            transition: transform 0.1s, opacity 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-start:hover { opacity: 0.93; }
        .btn-start:active { transform: scale(0.97); }

        /* ── 대기 ── */
        #waitingPage {
            background: #a8e0f5;
            position: relative;
            overflow: hidden;
        }

        .waiting-card {
            position: relative;
            z-index: 10;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 36px 28px;
            width: 90%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            margin-bottom: 180px;
        }

        .wait-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            animation: bounce 1.2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .wait-title { font-size: 1.15rem; font-weight: 800; color: #333; margin-bottom: 6px; }
        .wait-nick { color: #667eea; }
        .wait-sub { font-size: 0.85rem; color: #aaa; margin-bottom: 24px; }

        .dots span {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 3px;
            animation: dot-bounce 1.2s ease-in-out infinite;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-bounce {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(-6px); opacity: 1; }
        }

        .btn-cancel {
            margin-top: 20px;
            padding: 11px 28px;
            background: #f5f5f5;
            color: #999;
            border: none;
            border-radius: 99px;
            cursor: pointer;
            font-size: 0.88rem;
            transition: background 0.2s;
        }
        .btn-cancel:hover { background: #eee; color: #666; }

        /* ── 채팅 ── */
        #chatPage {
            position: fixed; inset: 0;
            display: none;
            flex-direction: column;
            max-width: 480px;
            margin: 0 auto;
            background: #f7f8fc;
        }
        #chatPage.active { display: flex; }

        .chat-header {
            padding: 14px 18px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            flex-shrink: 0;
        }

        .partner-info { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }
        .partner-name { font-weight: 800; font-size: 1rem; color: #222; }
        .partner-status { font-size: 0.72rem; color: #4ade80; margin-top: 2px; font-weight: 600; }
        .partner-status.offline { color: #f87171; }

        .header-actions { display: flex; gap: 8px; }
        .btn-next {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none;
            border-radius: 99px;
            font-size: 0.8rem; font-weight: 700;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(102,126,234,0.3);
        }
        .btn-exit {
            padding: 8px 14px;
            background: #f5f5f5;
            color: #999; border: none;
            border-radius: 99px;
            font-size: 0.8rem; cursor: pointer;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

        .msg-row { display: flex; align-items: flex-end; gap: 6px; }
        .msg-row.mine  { justify-content: flex-end; }
        .msg-row.other { justify-content: flex-start; }

        .msg-avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .msg-col { display: flex; flex-direction: column; max-width: 70%; }
        .msg-col.mine { align-items: flex-end; }
        .msg-col.other { align-items: flex-start; }

        .msg-sender { font-size: 0.72rem; color: #aaa; margin-bottom: 3px; font-weight: 600; }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: break-word;
        }
        .msg-row.mine .bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 3px 10px rgba(102,126,234,0.3);
        }
        .msg-row.other .bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .sys-msg {
            text-align: center;
            font-size: 0.78rem;
            color: #bbb;
            padding: 6px 12px;
            background: rgba(0,0,0,0.04);
            border-radius: 99px;
            margin: 4px auto;
        }

        .input-bar {
            padding: 12px 14px;
            background: white;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
            flex-shrink: 0;
        }
        #msgInput {
            flex: 1;
            padding: 12px 18px;
            background: #f5f6fa;
            border: 2px solid transparent;
            border-radius: 24px;
            color: #333;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        #msgInput:focus { border-color: #667eea; background: white; }
        #msgInput::placeholder { color: #bbb; }

        .btn-send {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; color: white;
            font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 3px 10px rgba(102,126,234,0.4);
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="landing-card">
        <div class="app-emoji">🌳</div>
        <h1 class="app-title">수다공원</h1>
        <p class="app-subtitle">낯선 사람과 편하게 수다 떨어요</p>
        <div class="nickname-label">✏️ 별명을 정해주세요</div>
        <input class="nickname-input" id="nicknameInput" type="text" placeholder="예: 공원산책중, 커피한잔" maxlength="10">
        <button class="btn-start" onclick="startChat()">공원 입장하기 🚪</button>
    </div>
</div>

<!-- 대기 -->
<div class="page" id="waitingPage">
    <img class="park-scene" src="/statichttps://raw.githubusercontent.com/mylove88man-web/random-chat/mainhttps://raw.githubusercontent.com/mylove88man-web/random-chat/main/park.png" alt="수다공원">
    <div class="waiting-card">
        <div class="wait-icon">🔍</div>
        <div class="wait-title">대화 상대를 찾고 있어요</div>
        <div class="wait-sub" id="waitNickLabel">잠시만 기다려주세요</div>
        <div class="dots" style="margin-top:16px">
            <span></span><span></span><span></span>
        </div>
        <button class="btn-cancel" onclick="cancelWait()">취소하기</button>
    </div>
</div>

<!-- 채팅 -->
<div id="chatPage">
    <div class="chat-header">
        <div class="partner-info">
            <div class="avatar">🌸</div>
            <div>
                <div class="partner-name" id="partnerName">상대방</div>
                <div class="partner-status" id="partnerStatus">● 연결됨</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-next" onclick="findNext()">다음 상대</button>
            <button class="btn-exit" onclick="exitChat()">나가기</button>
        </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="메시지를 입력하세요..." maxlength="300" autocomplete="off">
        <button class="btn-send" onclick="sendMsg()">▶</button>
    </div>
</div>

<script>
    const socket = io();
    let myNickname = '';
    let partnerNickname = '';

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('chatPage').classList.remove('active');
        if (id === 'chatPage') {
            document.getElementById('chatPage').classList.add('active');
        } else {
            document.getElementById(id).classList.add('active');
        }
    }

    function startChat() {
        const input = document.getElementById('nicknameInput').value.trim();
        myNickname = input || '익명의 방문자';
        document.getElementById('waitNickLabel').textContent = `"${myNickname}" 로 입장 중...`;
        showPage('waitingPage');
        socket.emit('find_partner', { nickname: myNickname });
    }

    function cancelWait() {
        socket.emit('cancel_wait');
        showPage('landingPage');
    }

    function findNext() {
        clearMessages();
        showPage('waitingPage');
        socket.emit('find_partner', { nickname: myNickname });
    }

    function exitChat() {
        socket.emit('cancel_wait');
        showPage('landingPage');
    }

    function sendMsg() {
        const input = document.getElementById('msgInput');
        const msg = input.value.trim();
        if (!msg) return;
        socket.emit('send_message', { message: msg });
        addBubble(msg, true, myNickname);
        input.value = '';
    }

    function addBubble(text, isMine, senderName) {
        const row = document.createElement('div');
        row.className = `msg-row ${isMine ? 'mine' : 'other'}`;

        if (!isMine) {
            const av = document.createElement('div');
            av.className = 'msg-avatar';
            av.textContent = '🌸';
            row.appendChild(av);
        }

        const col = document.createElement('div');
        col.className = `msg-col ${isMine ? 'mine' : 'other'}`;

        const sender = document.createElement('div');
        sender.className = 'msg-sender';
        sender.textContent = senderName;
        col.appendChild(sender);

        const b = document.createElement('div');
        b.className = 'bubble';
        b.textContent = text;
        col.appendChild(b);

        row.appendChild(col);
        appendMsg(row);
    }

    function addSys(text) {
        const div = document.createElement('div');
        div.className = 'sys-msg';
        div.textContent = text;
        appendMsg(div);
    }

    function appendMsg(el) {
        const box = document.getElementById('messages');
        box.appendChild(el);
        box.scrollTop = box.scrollHeight;
    }

    function clearMessages() {
        document.getElementById('messages').innerHTML = '';
        document.getElementById('partnerStatus').textContent = '● 연결됨';
        document.getElementById('partnerStatus').className = 'partner-status';
    }

    socket.on('waiting', () => showPage('waitingPage'));

    socket.on('matched', (data) => {
        partnerNickname = data.partner_nickname || '익명';
        document.getElementById('partnerName').textContent = partnerNickname;
        clearMessages();
        showPage('chatPage');
        addSys(`🎉 ${partnerNickname} 님과 연결됐어요! 반갑게 인사해보세요~`);
    });

    socket.on('receive_message', data => addBubble(data.message, false, partnerNickname));

    socket.on('partner_left', () => {
        addSys(`${partnerNickname} 님이 공원을 떠났어요 🍃`);
        document.getElementById('partnerStatus').textContent = '● 연결 끊김';
        document.getElementById('partnerStatus').className = 'partner-status offline';
    });

    document.getElementById('msgInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); sendMsg(); }
    });

    document.getElementById('nicknameInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') startChat();
    });
</script>
</body>
</html>
