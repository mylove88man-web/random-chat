<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>랜덤 채팅</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, 'Malgun Gothic', sans-serif; background: #0f0f1a; color: #eee; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .page { display: none; width: 100%; max-width: 480px; padding: 24px; }
        .page.active { display: flex; flex-direction: column; align-items: center; }
        .landing { text-align: center; gap: 12px; }
        .logo-wrap { width: 90px; height: 90px; border-radius: 28px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-size: 2.6rem; margin-bottom: 8px; box-shadow: 0 8px 32px rgba(102,126,234,0.4); }
        .app-title { font-size: 1.9rem; font-weight: 800; margin-bottom: 6px; }
        .app-desc { color: #888; font-size: 0.95rem; margin-bottom: 40px; }
        .btn-start { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 14px; font-size: 1.05rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 20px rgba(102,126,234,0.4); }
        .waiting-page { gap: 16px; text-align: center; }
        .radar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-size: 2.4rem; margin-bottom: 8px; animation: breathe 2s ease-in-out infinite; }
        @keyframes breathe { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(102,126,234,0.5); } 50% { transform: scale(1.06); box-shadow: 0 0 0 20px rgba(102,126,234,0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(102,126,234,0); } }
        .wait-title { font-size: 1.2rem; font-weight: 700; }
        .wait-sub { color: #666; font-size: 0.88rem; }
        .dot-anim::after { content: ''; animation: dots 1.4s steps(4, end) infinite; }
        @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } 100% { content: ''; } }
        .btn-cancel { margin-top: 12px; padding: 11px 30px; background: rgba(255,255,255,0.07); color: #aaa; border: 1px solid rgba(255,255,255,0.12); border-radius: 99px; cursor: pointer; font-size: 0.9rem; }
        #chatPage { position: fixed; inset: 0; display: none; flex-direction: column; max-width: 480px; margin: 0 auto; background: #0f0f1a; }
        #chatPage.active { display: flex; }
        .chat-header { padding: 14px 16px; background: #1a1a2e; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; }
        .partner-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .partner-name { font-weight: 700; font-size: 0.95rem; }
        .partner-status { font-size: 0.72rem; color: #4ade80; margin-top: 2px; }
        .partner-status.offline { color: #f87171; }
        .header-actions { display: flex; gap: 8px; }
        .btn-next { padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 99px; font-size: 0.82rem; font-weight: 700; cursor: pointer; }
        .btn-exit { padding: 8px 16px; background: rgba(255,255,255,0.07); color: #aaa; border: none; border-radius: 99px; font-size: 0.82rem; cursor: pointer; }
        .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .msg-row { display: flex; }
        .msg-row.mine { justify-content: flex-end; }
        .bubble { max-width: 72%; padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; line-height: 1.45; word-break: break-word; }
        .msg-row.mine .bubble { background: #667eea; color: #fff; border-bottom-right-radius: 4px; }
        .msg-row.other .bubble { background: #1e1e35; color: #eee; border-bottom-left-radius: 4px; }
        .sys-msg { text-align: center; font-size: 0.78rem; color: #555; padding: 4px 0; }
        .input-bar { padding: 12px 14px; background: #1a1a2e; display: flex; gap: 10px; align-items: center; border-top: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; }
        #msgInput { flex: 1; padding: 12px 16px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; color: #eee; font-size: 0.95rem; outline: none; }
        #msgInput::placeholder { color: #555; }
        .btn-send { width: 46px; height: 46px; border-radius: 50%; background: #667eea; border: none; color: white; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<div class="page landing active" id="landingPage">
    <div class="logo-wrap">💬</div>
    <h1 class="app-title">랜덤 채팅</h1>
    <p class="app-desc">전 세계 낯선 사람과 익명으로 대화해보세요</p>
    <button class="btn-start" onclick="startChat()">채팅 시작하기</button>
</div>
<div class="page waiting-page" id="waitingPage">
    <div class="radar">🔍</div>
    <div class="wait-title">상대방을 찾고 있어요<span class="dot-anim"></span></div>
    <div class="wait-sub">잠시만 기다려주세요</div>
    <button class="btn-cancel" onclick="cancelWait()">취소</button>
</div>
<div id="chatPage">
    <div class="chat-header">
        <div class="partner-info">
            <div class="avatar">👤</div>
            <div>
                <div class="partner-name">익명의 상대방</div>
                <div class="partner-status" id="partnerStatus">● 연결됨</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-next" onclick="findNext()">다음 상대 ›</button>
            <button class="btn-exit" onclick="exitChat()">나가기</button>
        </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="메시지 입력..." maxlength="300" autocomplete="off">
        <button class="btn-send" onclick="sendMsg()">▶</button>
    </div>
</div>
<script>
    const socket = io();
    function showPage(id) {
        ['landingPage','waitingPage'].forEach(p => document.getElementById(p).classList.remove('active'));
        document.getElementById('chatPage').classList.remove('active');
        document.getElementById(id).classList.add('active');
    }
    function startChat() { showPage('waitingPage'); socket.emit('find_partner'); }
    function cancelWait() { socket.emit('cancel_wait'); showPage('landingPage'); }
    function findNext() { clearMessages(); showPage('waitingPage'); socket.emit('find_partner'); }
    function exitChat() { socket.emit('cancel_wait'); showPage('landingPage'); }
    function sendMsg() {
        const input = document.getElementById('msgInput');
        const msg = input.value.trim();
        if (!msg) return;
        socket.emit('send_message', { message: msg });
        addBubble(msg, true);
        input.value = '';
    }
    function addBubble(text, isMine) {
        const row = document.createElement('div');
        row.className = `msg-row ${isMine ? 'mine' : 'other'}`;
        const b = document.createElement('div');
        b.className = 'bubble';
        b.textContent = text;
        row.appendChild(b);
        appendMsg(row);
    }
    function addSys(text) {
        const div = document.createElement('div');
        div.className = 'sys-msg';
        div.textContent = text;
        appendMsg(div);
    }
    function appendMsg(el) {
        const box = document.getElementById('messages');
        box.appendChild(el);
        box.scrollTop = box.scrollHeight;
    }
    function clearMessages() {
        document.getElementById('messages').innerHTML = '';
        const st = document.getElementById('partnerStatus');
        st.textContent = '● 연결됨';
        st.className = 'partner-status';
    }
    socket.on('waiting', () => showPage('waitingPage'));
    socket.on('matched', () => { clearMessages(); showPage('chatPage'); addSys('🎉 상대방과 연결됐어요! 대화를 시작해보세요.'); });
    socket.on('receive_message', data => addBubble(data.message, false));
    socket.on('partner_left', () => {
        addSys('상대방이 나갔어요. 다음 상대를 찾아볼까요?');
        const st = document.getElementById('partnerStatus');
        st.textContent = '● 연결 끊김';
        st.className = 'partner-status offline';
    });
    document.getElementById('msgInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); sendMsg(); } });
</script>
</body>
</html>
